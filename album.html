<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Divine Comedy — Freddie Freeloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0a0a; --bg2: #160d0d; --bg3: #1c1010;
      --accent: #c8a96e; --accent2: #7ecac8; --text: #e8ddd0; --muted: #6b5a52; --border: #2a1e1e;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; flex-direction: column; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2.5rem; border-bottom: 1px solid var(--border); background: rgba(14,10,10,0.96); backdrop-filter: blur(12px); flex-shrink: 0; z-index: 100; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: #7ecac8; text-decoration: none; }
    .nav-logo .cyrillic { color: #c8a96e; }
    .nav-logo .dot { color: #e8ddd0; }
    .nav-back { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); text-decoration: none; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; transition: color 0.2s; }
    .nav-back:hover { color: var(--accent); }
    .nav-back svg { width: 13px; fill: none; stroke: currentColor; stroke-width: 2; }

    .layout { display: grid; grid-template-columns: 320px 1fr 1fr; flex: 1; overflow: hidden; }

    /* LEFT */
    .left-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .album-cover-wrap { flex-shrink: 0; aspect-ratio: 1; width: 100%; overflow: hidden; border-bottom: 1px solid var(--border); }
    .album-cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.88); }
    .album-meta-strip { padding: 1rem 1.3rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .album-title-display { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .album-details { display: flex; gap: 1.2rem; font-size: 0.62rem; letter-spacing: 0.1em; color: var(--muted); }
    .album-details span { color: var(--accent2); }

    .tracklist { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .tracklist::-webkit-scrollbar { width: 3px; }
    .tracklist::-webkit-scrollbar-thumb { background: var(--border); }

    .track-row { display: grid; grid-template-columns: 30px 26px 1fr auto; align-items: center; gap: 0.75rem; padding: 0.8rem 1.3rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .track-row:hover { background: var(--bg3); }
    .track-row.active { background: var(--bg3); }
    .track-row.active .track-title { color: var(--accent); }
    .track-row.active .play-btn { border-color: var(--accent); }
    .track-row.active .play-btn svg { fill: var(--accent); }

    .play-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--muted); display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; flex-shrink: 0; }
    .play-btn:hover { border-color: var(--accent); }
    .play-btn svg { width: 8px; fill: var(--muted); transition: fill 0.2s; margin-left: 1px; }
    .play-btn.playing::after { content: ''; width: 7px; height: 7px; background: var(--accent); clip-path: polygon(0 0,40% 0,40% 100%,0 100%); box-shadow: 4px 0 0 var(--accent); }
    .play-btn.playing svg { display: none; }

    .track-num { font-size: 0.6rem; color: var(--muted); }
    .track-title { font-size: 0.78rem; color: var(--text); transition: color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-duration { font-size: 0.6rem; color: var(--muted); text-align: right; }

    /* MIDDLE */
    .middle-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .now-playing-header { padding: 1.4rem 1.8rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .now-playing-label { font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .now-playing-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-style: italic; color: var(--accent); }

    .waveform-section { padding: 1.6rem 1.8rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #waveform-canvas { width: 100%; height: 72px; cursor: pointer; display: block; }
    .scrubber-wrap { margin-top: 0.9rem; }
    #scrubber { width: 100%; -webkit-appearance: none; appearance: none; height: 2px; background: var(--border); outline: none; cursor: pointer; }
    #scrubber::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .time-row { display: flex; justify-content: space-between; margin-top: 0.45rem; font-size: 0.6rem; color: var(--muted); }

    .player-controls { display: flex; align-items: center; justify-content: center; gap: 1.8rem; padding: 1.2rem 1.8rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .ctrl-btn { background: none; border: none; cursor: pointer; color: var(--muted); transition: color 0.2s; display: flex; align-items: center; padding: 0; }
    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn svg { width: 17px; height: 17px; fill: currentColor; }
    .ctrl-btn.main-play { width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid var(--accent); color: var(--accent); justify-content: center; }
    .ctrl-btn.main-play:hover { background: rgba(200,169,110,0.1); }
    .ctrl-btn.main-play svg { width: 16px; height: 16px; margin-left: 2px; }

    audio { display: none; }

    .upload-prompt { padding: 1.2rem 1.8rem; flex-shrink: 0; }
    .upload-prompt p { font-size: 0.65rem; color: var(--muted); line-height: 1.7; }
    .upload-prompt strong { color: var(--accent2); }
    .file-input-label { display: inline-block; margin-top: 0.7rem; padding: 0.45rem 1rem; border: 1px solid var(--accent2); color: var(--accent2); font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; font-family: 'DM Mono', monospace; }
    .file-input-label:hover { background: rgba(126,202,200,0.08); }
    #file-input { display: none; }

    /* RIGHT */
    .right-col { display: flex; flex-direction: column; overflow: hidden; }
    .lyrics-header { padding: 1.4rem 1.8rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .lyrics-label { font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .lyrics-song-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--text); }
    .lyrics-scroll { flex: 1; overflow-y: auto; padding: 1.8rem; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .lyrics-scroll::-webkit-scrollbar { width: 3px; }
    .lyrics-scroll::-webkit-scrollbar-thumb { background: var(--border); }
    .lyrics-body { font-size: 0.84rem; line-height: 2.1; color: var(--text); white-space: pre-wrap; }
    .lyrics-placeholder { font-size: 0.73rem; color: var(--muted); line-height: 2; }
    .lyrics-placeholder em { color: var(--accent2); font-style: italic; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">F<span class="cyrillic">Ф</span><span class="dot">.</span></a>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
</nav>

<div class="layout">

  <!-- LEFT: Cover + Tracklist -->
  <div class="left-col">
    <div class="album-cover-wrap">
      <img src="A_Divine_Comedy.png" alt="A Divine Comedy">
    </div>
    <div class="album-meta-strip">
      <div class="album-title-display">A Divine Comedy</div>
      <div class="album-details">
        <div><span>2024</span></div>
        <div><span>10 tracks</span></div>
        <div><span>42:17</span></div>
      </div>
    </div>
    <div class="tracklist" id="tracklist"></div>
  </div>

  <!-- MIDDLE: Player + Waveform -->
  <div class="middle-col">
    <div class="now-playing-header">
      <div class="now-playing-label">Now Playing</div>
      <div class="now-playing-title" id="now-playing-title">Select a track</div>
    </div>
    <div class="waveform-section">
      <canvas id="waveform-canvas"></canvas>
      <div class="scrubber-wrap">
        <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1">
        <div class="time-row">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="btn-prev">
        <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
      <button class="ctrl-btn main-play" id="btn-play">
        <svg id="icon-play" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-next">
        <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
    </div>
    <div class="upload-prompt">
      <p><strong>Load audio:</strong> Click to load an MP3/WAV for the selected track. Stays local — nothing uploaded.</p>
      <label class="file-input-label" for="file-input">Load Audio File</label>
      <input type="file" id="file-input" accept="audio/*">
    </div>
  </div>

  <!-- RIGHT: Lyrics -->
  <div class="right-col">
    <div class="lyrics-header">
      <div class="lyrics-label">Lyrics</div>
      <div class="lyrics-song-title" id="lyrics-title">—</div>
    </div>
    <div class="lyrics-scroll">
      <div class="lyrics-body" id="lyrics-body">
        <span class="lyrics-placeholder">Select a track to see lyrics.<br><br><em>Edit the TRACKS array in album.html to add your lyrics.</em></span>
      </div>
    </div>
  </div>

</div>

<audio id="audio-player"></audio>

<script>
// ── EDIT YOUR TRACKS HERE ──────────────────────────────────────────
const TRACKS = [
  { title: "Track Title One",   duration: "3:42", file: "", lyrics: `[Verse 1]\nAdd your lyrics here.\nLine by line, just like this.\n\n[Chorus]\nThis is the chorus.\nChange this to your real words.\n\n[Verse 2]\nSecond verse goes here.\n\n[Outro]\nFinal lines of the song.` },
  { title: "Track Title Two",   duration: "4:10", file: "", lyrics: `` },
  { title: "Track Title Three", duration: "3:18", file: "", lyrics: `` },
  { title: "Track Title Four",  duration: "5:02", file: "", lyrics: `` },
  { title: "Track Title Five",  duration: "3:55", file: "", lyrics: `` },
  { title: "Track Title Six",   duration: "4:30", file: "", lyrics: `` },
  { title: "Track Title Seven", duration: "3:12", file: "", lyrics: `` },
  { title: "Track Title Eight", duration: "6:00", file: "", lyrics: `` },
  { title: "Track Title Nine",  duration: "3:44", file: "", lyrics: `` },
  { title: "Track Title Ten",   duration: "4:54", file: "", lyrics: `` },
];
// ──────────────────────────────────────────────────────────────────

const audio = document.getElementById('audio-player');
const canvas = document.getElementById('waveform-canvas');
const ctx2d = canvas.getContext('2d');
const scrubber = document.getElementById('scrubber');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');
const btnPlay = document.getElementById('btn-play');
const iconPlay = document.getElementById('icon-play');
const iconPause = document.getElementById('icon-pause');
const nowPlayingTitle = document.getElementById('now-playing-title');
const lyricsTitle = document.getElementById('lyrics-title');
const lyricsBody = document.getElementById('lyrics-body');
const fileInput = document.getElementById('file-input');
let currentTrack = -1, waveformData = null, audioCtx = null;

function buildTracklist() {
  const list = document.getElementById('tracklist');
  list.innerHTML = '';
  TRACKS.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'track-row';
    row.dataset.index = i;
    row.innerHTML = `
      <button class="play-btn" data-index="${i}">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <span class="track-num">${String(i+1).padStart(2,'0')}</span>
      <span class="track-title">${t.title}</span>
      <span class="track-duration">${t.duration}</span>`;
    row.addEventListener('click', () => loadTrack(i, true));
    list.appendChild(row);
  });
}

function loadTrack(index, autoplay = false) {
  if (index < 0 || index >= TRACKS.length) return;
  currentTrack = index;
  const t = TRACKS[index];
  document.querySelectorAll('.track-row').forEach((r, i) => {
    r.classList.toggle('active', i === index);
    r.querySelector('.play-btn').classList.remove('playing');
  });
  nowPlayingTitle.textContent = t.title;
  lyricsTitle.textContent = t.title;
  if (t.lyrics && t.lyrics.trim()) {
    lyricsBody.innerHTML = '';
    lyricsBody.className = 'lyrics-body';
    t.lyrics.split('\n').forEach(line => {
      const el = document.createElement('span');
      el.style.display = 'block';
      if (line.trim() === '') { el.style.height = '1.4rem'; }
      else if (line.startsWith('[')) { el.style.cssText = 'color:var(--accent);font-size:0.68rem;letter-spacing:0.2em;margin-top:0.4rem;'; }
      el.textContent = line;
      lyricsBody.appendChild(el);
    });
    document.querySelector('.lyrics-scroll').scrollTop = 0;
  } else {
    lyricsBody.className = 'lyrics-body';
    lyricsBody.innerHTML = `<span class="lyrics-placeholder">No lyrics for this track yet.<br><em>Edit the TRACKS array in album.html.</em></span>`;
  }
  if (t.file) { audio.src = t.file; generateWaveformFromAudio(t.file, autoplay); }
  else { waveformData = fakeWave(); drawWaveform(0); if (autoplay) audio.play().catch(()=>{}); }
}

function fakeWave() {
  const d = [];
  for (let i = 0; i < 120; i++) {
    const x = i/120;
    d.push(Math.max(0.05, Math.min(1, Math.sin(x*Math.PI*3)*0.3+0.5+(Math.random()-0.5)*0.5)));
  }
  return d;
}

function generateWaveformFromAudio(src, autoplay) {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  fetch(src).then(r=>r.arrayBuffer()).then(b=>audioCtx.decodeAudioData(b)).then(decoded=>{
    const raw = decoded.getChannelData(0), bars = 120, step = Math.floor(raw.length/bars), data = [];
    for (let i=0;i<bars;i++){let s=0;for(let j=0;j<step;j++)s+=Math.abs(raw[i*step+j]);data.push(s/step);}
    const mx = Math.max(...data);
    waveformData = data.map(v=>v/mx);
    drawWaveform(0);
    if (autoplay) audio.play().catch(()=>{});
  }).catch(()=>{ waveformData=fakeWave(); drawWaveform(0); });
}

function drawWaveform(progress) {
  const dpr = window.devicePixelRatio||1, W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W*dpr; canvas.height = H*dpr; ctx2d.scale(dpr,dpr);
  ctx2d.clearRect(0,0,W,H);
  if (!waveformData) return;
  const bars = waveformData.length, barW = W/bars, gap = 1.5;
  waveformData.forEach((v,i)=>{
    const x=i*barW, bH=v*(H-8), y=(H-bH)/2, played=(i/bars)<=progress;
    ctx2d.fillStyle = played ? '#c8a96e' : '#2a1e1e';
    ctx2d.fillRect(x+gap/2, y, barW-gap, bH);
    if (played) { ctx2d.fillStyle='rgba(200,169,110,0.4)'; ctx2d.fillRect(x+gap/2,y,barW-gap,2); }
  });
  if (progress>0&&progress<1) { ctx2d.fillStyle='#e8ddd0'; ctx2d.fillRect(progress*W-0.5,0,1.5,H); }
}

canvas.addEventListener('click', e=>{
  const pct=(e.clientX-canvas.getBoundingClientRect().left)/canvas.offsetWidth;
  if (audio.duration) audio.currentTime=pct*audio.duration;
  drawWaveform(pct);
});

audio.addEventListener('timeupdate',()=>{
  if (!audio.duration) return;
  const pct=audio.currentTime/audio.duration;
  scrubber.value=pct*100; timeCurrent.textContent=fmt(audio.currentTime); drawWaveform(pct);
});
audio.addEventListener('loadedmetadata',()=>{ timeTotal.textContent=fmt(audio.duration); });
audio.addEventListener('play',()=>{ iconPlay.style.display='none'; iconPause.style.display='';
  const r=document.querySelector(`.track-row[data-index="${currentTrack}"] .play-btn`); if(r)r.classList.add('playing'); });
audio.addEventListener('pause',()=>{ iconPlay.style.display=''; iconPause.style.display='none';
  const r=document.querySelector(`.track-row[data-index="${currentTrack}"] .play-btn`); if(r)r.classList.remove('playing'); });
audio.addEventListener('ended',()=>{ if(currentTrack<TRACKS.length-1)loadTrack(currentTrack+1,true); });
scrubber.addEventListener('input',()=>{ const p=scrubber.value/100; if(audio.duration)audio.currentTime=p*audio.duration; drawWaveform(p); });
document.getElementById('btn-play').addEventListener('click',()=>{ if(currentTrack===-1){loadTrack(0,true);return;} audio.paused?audio.play():audio.pause(); });
document.getElementById('btn-prev').addEventListener('click',()=>{ if(audio.currentTime>3){audio.currentTime=0;return;} loadTrack(Math.max(0,currentTrack-1),!audio.paused); });
document.getElementById('btn-next').addEventListener('click',()=>{ loadTrack(Math.min(TRACKS.length-1,currentTrack+1),!audio.paused); });

fileInput.addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file)return;
  const url=URL.createObjectURL(file); audio.src=url;
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  file.arrayBuffer().then(b=>audioCtx.decodeAudioData(b)).then(decoded=>{
    const raw=decoded.getChannelData(0),bars=120,step=Math.floor(raw.length/bars),data=[];
    for(let i=0;i<bars;i++){let s=0;for(let j=0;j<step;j++)s+=Math.abs(raw[i*step+j]);data.push(s/step);}
    const mx=Math.max(...data); waveformData=data.map(v=>v/mx); drawWaveform(0); audio.play().catch(()=>{});
  }).catch(()=>{ waveformData=fakeWave(); drawWaveform(0); audio.play().catch(()=>{}); });
});

function fmt(s) { if(!s||isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
window.addEventListener('resize',()=>drawWaveform(audio.duration?audio.currentTime/audio.duration:0));
buildTracklist(); waveformData=fakeWave(); drawWaveform(0);
</script>
</body>
</html>
